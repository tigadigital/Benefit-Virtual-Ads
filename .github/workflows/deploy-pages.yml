name: Deploy VA Ploting to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static website
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public
          mkdir -p public

          # Salin file website tanpa folder workflow atau arsip lokal.
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'public' \
            ! -name '*.zip' \
            -exec cp -R {} public/ \;

          BUILD_VERSION="${GITHUB_SHA::12}"
          DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          # Cache-busting untuk file utama pada setiap deployment.
          sed -i "s/__BUILD_VERSION__/${BUILD_VERSION}/g" public/index.html

          cat > public/version.json <<JSON
          {
            "version": "${BUILD_VERSION}",
            "deployedAt": "${DEPLOYED_AT}"
          }
          JSON

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
